version: '3.8'

services:
  marketplace-api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:80"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=marketplace-db;Database=marketplace;Username=marketplace;Password=password
      - PolyBucket__ApiUrl=http://polybucket-api:5000
      - Authentication__Authority=http://polybucket-api:5000
      - Authentication__Audience=marketplace-api
    depends_on:
      - marketplace-db
      - redis
    volumes:
      - ./backend:/app
      - /app/bin
      - /app/obj

  marketplace-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://marketplace-api:5001
      - NEXT_PUBLIC_POLYBUCKET_URL=http://polybucket-frontend:3000
    depends_on:
      - marketplace-api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  marketplace-db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=marketplace
      - POSTGRES_USER=marketplace
      - POSTGRES_PASSWORD=password
    ports:
      - "5433:5432"
    volumes:
      - marketplace_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  marketplace_data:
  redis_data:
