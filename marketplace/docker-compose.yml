version: '3.8'

services:
  marketplace-api:
    build: 
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "10120:10280"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS:-http://+:10280}
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection:-Host=marketplace-db;Database=marketplace;Username=marketplace;Password=password}
      - FileStorage__UploadPath=${FileStorage__UploadPath:-uploads/plugins}
      - Jwt__SecretKey=${Jwt__SecretKey}
      - Jwt__Issuer=${Jwt__Issuer:-PolyBucket.Marketplace.Api}
      - Jwt__Audience=${Jwt__Audience:-PolyBucket.Marketplace.Client}
      - Jwt__ExpiryMinutes=${Jwt__ExpiryMinutes:-60}
      - GitHub__ClientId=${GitHub__ClientId:-${NEXT_PUBLIC_GITHUB_CLIENT_ID}}
      - GitHub__ClientSecret=${GitHub__ClientSecret}
      - GitHub__RedirectUri=${GitHub__RedirectUri:-${NEXT_PUBLIC_GITHUB_REDIRECT_URI}}
    depends_on:
      - marketplace-db
      - redis
    volumes:
      - ./backend:/app
      - /app/bin
      - /app/obj

  marketplace-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "10110:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:10120}
      - NEXT_PUBLIC_POLYBUCKET_URL=${NEXT_PUBLIC_POLYBUCKET_URL:-http://localhost:3000}
      - NEXT_PUBLIC_GITHUB_CLIENT_ID=${NEXT_PUBLIC_GITHUB_CLIENT_ID}
      - NEXT_PUBLIC_GITHUB_REDIRECT_URI=${NEXT_PUBLIC_GITHUB_REDIRECT_URI:-http://localhost:10110/auth/callback}
    depends_on:
      - marketplace-api
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

volumes:
  marketplace_data:
  redis_data:
