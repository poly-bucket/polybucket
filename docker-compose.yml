services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.backend
      target: development
    ports:
      - "11666:11666"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://*:11666
      - ConnectionStrings__DefaultConnection=Host=db;Database=polybucket;Username=postgres;Password=postgres
      - JWT_SECRET=${JWT_SECRET:-development-jwt-secret-key-change-in-production-minimum-32-characters-long}
      - AppSettings__Security__JwtSecret=${JWT_SECRET:-development-jwt-secret-key-change-in-production-minimum-32-characters-long}
      - Admin__Username=${Admin__Username:-admin}
      - Admin__Email=${Admin__Email:-admin@polybucket.com}
      - Admin__Password=${Admin__Password:-}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
      - /app/backend/bin
      - /app/backend/obj
    networks:
      - polybucket-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11666/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  client:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - polybucket-network

  db:
    image: postgres:latest
    container_name: polybucket-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: polybucket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - polybucket-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d polybucket"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: polybucket-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - polybucket-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

networks:
  polybucket-network:
    name: polybucket-network
    driver: bridge

volumes:
  postgres-data:
  minio-data: